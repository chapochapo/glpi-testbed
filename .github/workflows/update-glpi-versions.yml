name: Update GLPI versions

on:
  schedule:
    - cron: '0 9 * * 1'   # Every Monday at 09:00 UTC
  workflow_dispatch:       # Allow manual trigger from the Actions tab

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Fetch latest GLPI versions and update files
        run: python3 update-versions.py

      - name: Open pull request if versions changed
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update GLPI versions from Docker Hub"
          title: "chore: update GLPI versions"
          body: |
            New GLPI patch versions detected on Docker Hub.

            - Updated `VERSIONS_10X` / `VERSIONS_11X` in `generate-compose.py`
            - Regenerated `docker-compose.yml`

            *This PR was opened automatically by the update-glpi-versions workflow.*
          branch: auto/update-glpi-versions
          delete-branch: true
          labels: automated
